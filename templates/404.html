{% extends "layout.html" %}
{% block title %}404 – Not Found{% endblock %}
{% block content %}
<div class="text-center py-5">
  <div style="font-family:'Syne',sans-serif;font-size:6rem;font-weight:800;color:var(--gold);line-height:1;">404</div>
  <h4 style="color:var(--brown);">Page Not Found</h4>
  <p style="color:var(--muted);">The page you're looking for doesn't exist.</p>
  <a href="{{ url_for('dashboard') }}" class="btn btn-brand mt-2">
    <i class="bi bi-house me-1"></i>Go to Dashboard
  </a>
</div>
{% endblock %}
