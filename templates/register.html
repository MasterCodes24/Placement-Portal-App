{% extends "layout.html" %}
{% block title %}Register – PlaceHub{% endblock %}

{% block head %}
<style>
  body {
    background: linear-gradient(135deg, #895129 0%, #c47a3a 55%, #FFC107 100%) !important;
  }
  body::before { display: none; }

  .reg-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .reg-card {
    width: 100%;
    max-width: 520px;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(137,81,41,.40);
    overflow: hidden;
    border: none;
  }
  .reg-top {
    background: #895129;
    padding: 1.6rem 2rem 1.2rem;
    border-bottom: 4px solid #FFC107;
    position: relative;
    overflow: hidden;
  }
  .reg-top::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 110px; height: 110px;
    background: rgba(255,193,7,.16);
    clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  }
  .reg-top .logo {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem;
    font-weight: 800;
    color: #fff;
    position: relative;
    z-index: 1;
  }
  .reg-top .logo span { color: #FFC107; }
  .reg-top p { color: rgba(255,255,255,.65); font-size: .85rem; margin: .25rem 0 0; position: relative; z-index: 1; }
  .reg-body { background: #FFFDD0; padding: 2rem; }
  .form-label { font-weight: 500; font-size: .87rem; color: #895129; }
  .form-control, .form-select {
    border-radius: 8px;
    border: 1.5px solid #e8d9b0;
    padding: .5rem .85rem;
    font-size: .88rem;
    background: #fff;
    color: #895129;
  }
  .form-control:focus, .form-select:focus {
    border-color: #FFC107;
    box-shadow: 0 0 0 3px rgba(255,193,7,.22);
    color: #895129;
  }
  .form-control::placeholder { color: #b89070; }
  .form-select option { color: #333; background: #fff; }
  .section-divider {
    font-size: .78rem;
    text-transform: uppercase;
    letter-spacing: .6px;
    color: #7a5c3a;
    margin: .25rem 0;
    font-weight: 600;
  }
</style>
{% endblock %}

{% block content %}
<div class="reg-wrap">
  <div class="reg-card">
    <div class="reg-top">
      <div class="logo">Place<span>Hub</span></div>
      <p>Create your account</p>
    </div>
    <div class="reg-body">
      <form method="POST" action="{{ url_for('register') }}" id="regForm">

        <!-- Role selector -->
        <div class="mb-3">
          <label class="form-label" for="role">I am registering as</label>
          <select class="form-select" id="role" name="role" required onchange="switchRole(this.value)">
            <option value="" disabled selected>Select role…</option>
            <option value="Student">Student</option>
            <option value="Company">Company / Recruiter</option>
          </select>
        </div>

        <!-- Common fields -->
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label" for="username">Username</label>
            <input class="form-control" type="text" id="username" name="username"
                   placeholder="unique username" required />
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label" for="password">Password</label>
            <input class="form-control" type="password" id="password" name="password"
                   placeholder="choose a password" required />
          </div>
        </div>

        <!-- Student-only fields -->
        <div id="studentFields">
          <hr style="border-color:#e8d9b0;margin:.4rem 0 .8rem;">
          <p class="section-divider">Student Details</p>
          <div class="mb-3">
            <label class="form-label" for="full_name">Full Name</label>
            <input class="form-control" type="text" id="full_name" name="full_name" placeholder="Your full name" />
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label" for="roll_number">Roll Number</label>
              <input class="form-control" type="text" id="roll_number" name="roll_number" placeholder="e.g. CS2021001" />
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label" for="skills">Skills</label>
              <input class="form-control" type="text" id="skills" name="skills" placeholder="Python, Java, SQL…" />
            </div>
          </div>
        </div>

        <!-- Company-only fields -->
        <div id="companyFields" style="display:none;">
          <hr style="border-color:#e8d9b0;margin:.4rem 0 .8rem;">
          <p class="section-divider">Company Details</p>
          <div class="mb-3">
            <label class="form-label" for="company_name">Company Name</label>
            <input class="form-control" type="text" id="company_name" name="company_name" placeholder="Acme Corp" />
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label" for="hr_contact">HR Contact Email</label>
              <input class="form-control" type="text" id="hr_contact" name="hr_contact" placeholder="hr@company.com" />
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label" for="website">Website</label>
              <input class="form-control" type="text" id="website" name="website" placeholder="https://company.com" />
            </div>
          </div>
        </div>

        <button type="submit" class="btn btn-accent w-100 py-2 mt-2">
          <i class="bi bi-person-plus me-2"></i>Create Account
        </button>
      </form>

      <hr style="border-color:#e8d9b0;margin:1rem 0;">
      <p class="text-center mb-0" style="font-size:.87rem;color:#7a5c3a;">
        Already have an account?
        <a href="{{ url_for('login') }}" style="color:#895129;font-weight:700;">Sign in</a>
      </p>
    </div>
  </div>
</div>

<script>
function switchRole(role) {
  document.getElementById('studentFields').style.display = (role === 'Student') ? 'block' : 'none';
  document.getElementById('companyFields').style.display = (role === 'Company') ? 'block' : 'none';
}
window.onload = function() {
  const sel = document.getElementById('role');
  if (sel.value) switchRole(sel.value);
};
</script>
{% endblock %}
